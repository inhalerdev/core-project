appeal-url: "https://mineacle.net/appeal"
case-prefix: "MCL"
case-length: 6

commands:
  tempban: "tempban %player% %duration% %reason% Appeal ID: %case_id% Appeal: %appeal_url%"
  permaban: "ban %player% %reason% Appeal ID: %case_id% Appeal: %appeal_url%"

gui:
  title: "&8Ban Player"

messages:
  banned: "&#bbbbbbBanned &#ff88ff%player% &#bbbbbbwith case &#ff88ff%case_id%"

reasons:
  cheating:
    slot: 10
    material: DIAMOND_SWORD
    name: "&cCheating"
    lore:
      - "&#bbbbbbUnfair combat or movement"
    reason: "Cheating"

  xray:
    slot: 11
    material: DIAMOND_ORE
    name: "&cX-Ray"
    lore:
      - "&#bbbbbbIllegal mining advantage"
    reason: "X-Ray"

  duping:
    slot: 12
    material: CHEST
    name: "&cDuping"
    lore:
      - "&#bbbbbbDuplicating items or currency"
    reason: "Duping"

  exploiting:
    slot: 13
    material: REDSTONE
    name: "&cExploiting"
    lore:
      - "&#bbbbbbAbusing bugs or mechanics"
    reason: "Exploiting"

  harassment:
    slot: 14
    material: PLAYER_HEAD
    name: "&cHarassment"
    lore:
      - "&#bbbbbbTargeted toxic behavior"
    reason: "Harassment"

  advertising:
    slot: 15
    material: PAPER
    name: "&cAdvertising"
    lore:
      - "&#bbbbbbAdvertising another server"
    reason: "Advertising"

durations:
  one-day:
    slot: 21
    material: CLOCK
    name: "&d1 Day"
    lore:
      - "&#bbbbbbTemporary ban"
    duration: "1d"
    permanent: false

  seven-days:
    slot: 22
    material: CLOCK
    name: "&d7 Days"
    lore:
      - "&#bbbbbbTemporary ban"
    duration: "7d"
    permanent: false

  thirty-days:
    slot: 23
    material: CLOCK
    name: "&d30 Days"
    lore:
      - "&#bbbbbbTemporary ban"
    duration: "30d"
    permanent: false

  permanent:
    slot: 24
    material: BARRIER
    name: "&cPermanent"
    lore:
      - "&#bbbbbbPermanent ban"
    duration: "perm"
    permanent: true
