appeal-url: "https://bans.mineacle.net"
case-prefix: "MCL"
case-length: 6
confirm-timeout-seconds: 5

gui:
  title: "Punish Player"
  confirm-title: "Confirm Punishment"

messages:
  confirm-again: "&#bbbbbbClick confirm again to continue"
  timeout: "&cAction timed out"
  cancelled: "&cPunishment cancelled"
  success: "&#bbbbbbPunished &#ff88ff%player% &#bbbbbbwith case &#ff88ff%case_id%"

# These run from console. Keep no leading slash.
# LiteBans should remain the storage/history/enforcement layer.
commands:
  warn: "warn %player% %reason% | Appeal ID: %case_id% | Appeal: %appeal_url%"
  kick: "kick %player% %reason% | Appeal ID: %case_id% | Appeal: %appeal_url%"
  mute: "mute %player% %reason% | Appeal ID: %case_id% | Appeal: %appeal_url%"
  tempmute: "tempmute %player% %duration% %reason% | Appeal ID: %case_id% | Appeal: %appeal_url%"
  tempban: "tempban %player% %duration% %reason% | Appeal ID: %case_id% | Appeal: %appeal_url%"
  ban: "ban %player% %reason% | Appeal ID: %case_id% | Appeal: %appeal_url%"

