enabled: true

updates:
  # Rebuild rank, nickname, colors, and visibility once per second.
  content-ticks: 20

  # Follow the player's live bounding box for crouching, swimming, and gliding.
  movement-ticks: 2

  # Remove stale display entities and empty Mineacle scoreboard teams.
  cleanup-ticks: 600

worlds:
  enabled: false
  list:
    - spawn1
    - spawn2
    - spawn3
    - overworld
    - overworld_nether
    - overworld_the_end

rank:
  enabled: true
  use-placeholderapi: true
  placeholder: "%luckperms_prefix%"
  fallback: ""

  # Java enforces exactly one visible space after every non-empty rank
  separator: " "

name-color:
  enabled: true
  default: "&f"
  op: "&d"

suffix: ""

display:
  # Calculated from the player's current bounding-box maximum
  vertical-offset: 0.32
  view-range: 1.0
  line-width: 200
  shadowed: true
  see-through: false
  default-background: false

collision:
  # Mineacle nametag teams also disable player collision
  disabled: true
