# MineacleCore command security
# This file controls which root slash commands are visible in / tab completion
# and which player commands are allowed to run.

enabled: true

# Players with this permission bypass command blocking and tab filtering.
bypass-permission: mineaclesecurity.bypass

unknown-command-message: "&cThis command does not exist"
reload-message: "&#bbbbbbSecurity reloaded"

# If true, players may only run commands listed in one of their active groups.
# Console is not affected.
block-unlisted-player-commands: true

# If true, namespaced backend commands like /bukkit:plugins and /minecraft:me are hidden/blocked.
block-namespaced-commands: true

blocked-prefixes:
  - "bukkit:"
  - "spigot:"
  - "paper:"
  - "minecraft:"
  - "luckperms:"
  - "placeholderapi:"
  - "worldedit:"
  - "worldguard:"
