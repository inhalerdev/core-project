      - "spawn"
      - "stats"
      - "store"
      - "team"
      - "tell"
      - "tpa"
      - "tpaccept"
      - "tpahere"
      - "tpdeny"
      - "warp"
      - "whisper"
      - "wild"
      - "x"

  plus:
    permission: "mineacle.plus"
    priority: 10
    inherits:
      - "default"
    commands:
      - "fly"
      - "hide"
      - "nick"

  admin:
    permission: "mineaclesecurity.group.admin"
    priority: 100
    inherits:
      - "plus"
    commands:
      - "ban"
      - "banmenu"
      - "baltop"
      - "eco"
