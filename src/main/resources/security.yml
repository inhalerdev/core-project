  plus:
    permission: "mineacle.plus"
    priority: 10
    inherits:
      - "default"
    visible-commands:
      - "fly"
      - "hide"
      - "nick"
    hidden-commands: []
    allowed-commands: []

  admin:
    permission: "mineaclesecurity.group.admin"
    priority: 100
    inherits:
