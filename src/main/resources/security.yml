# MineacleCore command security
# Controls root / tab visibility and which player commands may run.
# Command matching is case-insensitive; keep command names lowercase here.

enabled: true
bypass-permission: mineaclesecurity.bypass
unknown-command-message: "&cThis command does not exist"
reload-message: "&#bbbbbbSecurity reloaded"
usage-message: "&#bbbbbbUsage: &d/mineaclesecurity reload"
groups-message: "&#bbbbbbActive command groups: &d%groups%"

block-unlisted-player-commands: true
block-namespaced-commands: true

blocked-prefixes:
  - "bukkit:"
  - "spigot:"
  - "paper:"
  - "minecraft:"
  - "luckperms:"
  - "placeholderapi:"
  - "worldedit:"
  - "worldguard:"
  - "multiverse-core:"
  - "multiverse-inventories:"
