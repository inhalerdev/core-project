# Always blocked for players unless they have the bypass permission.
console-only-commands:
  - "ban-ip"
  - "deop"
  - "op"
  - "pardon-ip"
  - "reload"
  - "restart"
  - "rl"
  - "save-all"
  - "save-off"
  - "save-on"
  - "stop"
  - "whitelist"

# Edit tab/command visibility here.
# A group is active when permission is blank, or the player has the permission.
# Groups can inherit another group's command list.
# priority only controls load/order display; all active groups combine together.
groups:
  default:
    permission: ""
    priority: 0
    inherits: []
    commands:
      - "bal"
      - "balance"
      - "balancetop"
      - "baltop"
      - "bounty"
      - "buy"
      - "delhome"
      - "discord"
      - "guide"
      - "home"
      - "ignore"
