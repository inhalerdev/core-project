enabled: true

queue:
  min-players: 2
  max-players: 8
  countdown-seconds: 30

duel-request:
  timeout-seconds: 60

arena:
  world: origins
  min-radius: 250
  max-radius: 0
  find-location-attempts: 80

# Admin setup:
# Stand in the center of the duel circle and run /duel zone set <id> [radius]
# Example: /duel zone set spawn1 5
queue-zones:
  spawn1:
    world: spawn1
    x: -35.5
    y: 76.0
    z: -95.5
    radius: 5.0
    min-y: 72.0
    max-y: 82.0

  spawn2:
    world: spawn2
    x: -35.5
    y: 76.0
    z: -95.5
    radius: 5.0
    min-y: 72.0
    max-y: 82.0

  spawn3:
    world: spawn3
    x: -35.5
    y: 76.0
    z: -95.5
    radius: 5.0
    min-y: 72.0
    max-y: 82.0

blocked-commands:
  - spawn
  - home
  - homes
  - tpa
  - tpahere
  - tpaccept
  - tpdeny
  - tpacancel
  - rtp
  - wild
  - originrtp
  - warp
  - team home
  - fly

messages:
  disabled: "&cDuels are disabled"
  self: "&cYou cannot duel yourself"
  invalid-player: "&cThat player cannot duel right now"
  already-in-duel: "&cThat player is already in a duel"
  no-arena: "&cCould not find a safe duel location"

  invite-sent: "&#bbbbbbDuel request sent to &d%target%"
  invite-received: "&d%player% &#bbbbbbsent you a duel request. Type &d/duel accept"
  invite-denied: "&d%player% &#bbbbbbdenied your duel request"
  denied: "&#bbbbbbDuel request denied"
  no-invite: "&cYou do not have a pending duel request"
  no-outgoing: "&cYou do not have an outgoing duel request"
  inviter-offline: "&cThat player is no longer online"
  cancelled: "&#bbbbbbDuel request cancelled"

  queue-joined: ""
  queue-left: "&#bbbbbbNo longer queued for duels"
  queue-started: ""
  queue-cancelled: ""
  queue-waiting-actionbar: "&#bbbbbbDuel queue &8» &#bbbbbbWaiting for an opponent"
  queue-actionbar: "&#bbbbbbDuel queue &8» &d%queued%/%max% &#bbbbbbfighters &8» &#bbbbbbTeleporting in &d%seconds%s"
