enabled: true

queue:
  min-players: 2
  max-players: 8
  countdown-seconds: 30

duel-request:
  timeout-seconds: 60

arena:
  world: origins
  min-radius: 250
  max-radius: 0
  find-location-attempts: 80

# Admin setup:
# Stand in the center of the duel circle and run /duel zone set <id> [radius]
# Example: /duel zone set spawn1 5
queue-zones:
  spawn1:
    world: spawn1
    x: -63.5
    y: 76.0
    z: -112.5
    radius: 9.0
    min-y: 73.0
    max-y: 81.0

  spawn2:
    world: spawn2
    x: -63.5
    y: 76.0
    z: -112.5
    radius: 9.0
    min-y: 73.0
    max-y: 81.0

  spawn3:
    world: spawn3
    x: -63.5
    y: 76.0
    z: -112.5
    radius: 9.0
    min-y: 73.0
    max-y: 81.0

blocked-commands:
  - spawn
  - home
  - homes
  - tpa
  - tpahere
  - tpaccept
  - tpdeny
  - tpacancel
  - rtp
  - wild
  - originrtp
  - warp
  - team home
  - fly

messages:
  disabled: "&cDuels are disabled"
  self: "&cYou cannot duel yourself"
  invalid-player: "&cThat player cannot duel right now"
  already-in-duel: "&cThat player is already in a duel"
