  invite-denied: "&#bbbbbb%player% &cdenied&#bbbbbb your duel request"
  denied: "&#bbbbbbDuel request &cdenied"
  no-invite: "&cYou do not have a pending duel request"
  no-outgoing: "&cYou do not have an outgoing duel request"
  inviter-offline: "&cThat player is no longer online"
  cancelled: "&#bbbbbbDuel request &ccancelled"

  queue-joined: ""
  queue-left: "" #&#bbbbbbNo longer queued for duels
  queue-started: ""
  queue-cancelled: ""
  queue-waiting-actionbar: "&#bbbbbbQueue: &eWaiting for an opponent"
  queue-actionbar: "&#bbbbbbQueue: &a%queued%/%max% teleporting in &d%seconds%s"
