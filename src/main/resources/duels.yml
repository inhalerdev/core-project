enabled: true

queue:
  min-players: 2
  max-players: 8
  countdown-seconds: 30

duel-request:
  timeout-seconds: 60

# Duels are loose survival PvP matchmaking.
# Players are matched, RTP'd together into Origins, briefly held for a fair start,
# then released into normal survival PvP.
loose-tracking-seconds: 180

destination:
  world: origins
  min-radius: 250
  max-radius: 0
  find-location-attempts: 80

fair-start:
  enabled: true
  countdown-seconds: 5
  freeze-movement: true
  prevent-damage: true
  prevent-interact: true

# Admin setup:
# Stand in the center of the duel circle and run /duel zone set <id> [radius]
# Example: /duel zone set spawn1 9
queue-zones:
  spawn1:
    world: spawn1
    x: -63.5
    y: 76.0
    z: -112.5
    radius: 9.0
    min-y: 73.0
    max-y: 81.0

  spawn2:
    world: spawn2
    x: -63.5
    y: 76.0
    z: -112.5
    radius: 9.0
    min-y: 73.0
    max-y: 81.0

  spawn3:
    world: spawn3
    x: -63.5
    y: 76.0
    z: -112.5
    radius: 9.0
    min-y: 73.0
    max-y: 81.0

