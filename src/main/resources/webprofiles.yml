enabled: true

database:
  driver-class: "com.mysql.cj.jdbc.Driver"
  jdbc-url: "jdbc:mysql://mysql.mineacle.net:3306/mineacle_core?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=10000"
  username: "mineacle_core_user"
  password: "*nidnarB2026"
  table: "mineacle_web_profiles"
  teams-table: "mineacle_web_teams"

sync:
  interval-seconds: 120
  leaderboard-pull-limit: 500
  include-known-offline-players: true
  offline-player-pull-limit: 10000
  mark-offline-on-disable: true

rank:
  default-key: "default"
  default-name: "Member"
  default-prefix: ""
  default-color: "#bbbbbb"

  permission-ranks:
    developer:
      name: "Developer"
      prefix: "Developer"
      color: "#ffaa00"
      permission: "mineacle.rank.developer"
      weight: 1000

    admin:
      name: "Admin"
      prefix: "Admin"
      color: "#ff5555"
      permission: "mineacle.rank.admin"
      weight: 900

    plus:
      name: "Mineacle+"
      prefix: "Mineacle+"
      color: "#ff55ff"
      permission: "mineacle.plus"
      weight: 100

web-teams:
  enabled: true
  interval-seconds: 120
  min-members: 1
  min-kills: 0
