enabled: true

database:
  driver-class: "com.mysql.cj.jdbc.Driver"
  jdbc-url: "jdbc:mysql://127.0.0.1:3306/mineacle?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
  username: "mineacle_core"
  password: "pw_5597bf11"
  table: "mineacle_web_profiles"

sync:
  interval-seconds: 120
  leaderboard-pull-limit: 500
  include-known-offline-players: true
  offline-player-pull-limit: 10000
  mark-offline-on-disable: true

rank:
  default-name: "Member"
  permission-ranks:
    owner:
      name: "Owner"
      permission: "mineacle.rank.owner"
      weight: 1000
    admin:
      name: "Admin"
      permission: "mineacle.rank.admin"
      weight: 900
    moderator:
      name: "Moderator"
      permission: "mineacle.rank.mod"
      weight: 700
    plus:
      name: "Mineacle+"
      permission: "mineacle.plus"
      weight: 100
