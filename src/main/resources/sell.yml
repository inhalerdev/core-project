settings:
  allow-all-items-with-fallback: true
  deny-custom-items: false
  deny-filled-containers: true
  deny-enchanted-items: false

  blocked-items:
    - BEDROCK
    - BARRIER
    - COMMAND_BLOCK
    - CHAIN_COMMAND_BLOCK
    - REPEATING_COMMAND_BLOCK
    - STRUCTURE_BLOCK
    - STRUCTURE_VOID
    - JIGSAW
    - DEBUG_STICK
    - PLAYER_HEAD

  # These may appear in /worth but cannot be sold to the server.
  unsellable-items:
    - DRAGON_EGG

durability:
  enabled: true

  # A nearly broken item keeps 10% of its market-adjusted base value.
  minimum-base-multiplier: 0.10

  # Enchantments retain at least half of their configured value.
  minimum-enchant-multiplier: 0.50

market:
  enabled: true

  # Items using category fallback prices stay static unless explicitly enabled.
  fallback-items-enabled: false

  # MySQL/MariaDB uses the database section from webprofiles.yml.
  # sell-market.yml remains an automatic local fallback/checkpoint.
  storage: mysql
  database-config-file: webprofiles.yml
  table-prefix: mineacle_sell

  reprice-interval-minutes: 15
  flush-seconds: 30
  bucket-minutes: 60
  retention-days: 7

  minimum-multiplier: 0.35
  maximum-multiplier: 1.75
  maximum-change-per-refresh-percent: 8.0
  minimum-observation-hours: 6

  weights:
    last-6-hours: 0.60
    last-24-hours: 0.30
    last-7-days: 0.10

  categories:
    blocks:
      enabled: true
    ores:
      enabled: true
    wood:
      enabled: true
    farming:
      enabled: true
    mob_drops:
      enabled: true
    nether:
      enabled: true
    end:
      enabled: true
    combat:
      enabled: false
    misc:
      enabled: false

  # Expected server-wide units sold per day.
  targets:
    blocks: 50000
    ores: 2000
    wood: 15000
    farming: 25000
    mob_drops: 15000
    nether: 5000
    end: 1500
    combat: 250
    misc: 500

  featured:
    rotation-hours: 12
    active-items: 8
    minimum-multiplier: 1.10
    maximum-multiplier: 1.35

    pool:
      - SUGAR_CANE
      - WHEAT
      - CARROT
      - POTATO
      - PUMPKIN
      - MELON_SLICE
      - GUNPOWDER
      - BONE
      - STRING
      - ROTTEN_FLESH
      - SPIDER_EYE
      - SLIME_BALL
      - COAL
      - IRON_INGOT
      - COPPER_INGOT
      - GOLD_INGOT
      - REDSTONE
      - LAPIS_LAZULI
      - AMETHYST_SHARD
      - DIAMOND
      - EMERALD
      - BLAZE_ROD
      - BLAZE_POWDER
      - GHAST_TEAR
      - MAGMA_CREAM
      - QUARTZ
      - ENDER_PEARL
      - SHULKER_SHELL
      - OAK_LOG
      - SPRUCE_LOG
      - BIRCH_LOG
      - JUNGLE_LOG
      - ACACIA_LOG
      - DARK_OAK_LOG
      - CHERRY_LOG
      - MANGROVE_LOG

    excluded-items:
      - DRAGON_EGG
      - ELYTRA
      - NETHER_STAR
      - NETHERITE_BLOCK
      - NETHERITE_INGOT
      - TOTEM_OF_UNDYING
      - ENCHANTED_GOLDEN_APPLE
      - PLAYER_HEAD

