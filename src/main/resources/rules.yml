menu_title: "Rules"
size: 27
items:
  respect:
    material: PLAYER_HEAD
    slot: 10
    display_name: "&dRule 1 &8┃ &#ffffffRespect Players"
    lore:
      - "&#bbbbbbNo harassment, hate speech, threats, or targeted toxicity"
      - "&#bbbbbbKeep chat playable for everyone"
  cheating:
    material: DIAMOND_SWORD
    slot: 11
    display_name: "&dRule 2 &8┃ &#ffffffNo Cheating"
    lore:
      - "&#bbbbbbNo hacked clients, macros, x-ray, autoclickers, or unfair mods"
      - "&#bbbbbbAnything giving an unfair advantage is not allowed"
  exploits:
    material: REDSTONE
    slot: 12
    display_name: "&dRule 3 &8┃ &#ffffffNo Exploits"
    lore:
      - "&#bbbbbbDo not abuse bugs, dupes, lag machines, or bypasses"
      - "&#bbbbbbReport serious issues to staff"
  economy:
    material: EMERALD
    slot: 13
    display_name: "&dRule 4 &8┃ &#ffffffFair Economy"
    lore:
      - "&#bbbbbbNo scamming through bugs, chargeback abuse, or alt abuse"
      - "&#bbbbbbPlayer trading is allowed when done fairly"
  griefing:
    material: TNT
    slot: 14
    display_name: "&dRule 5 &8┃ &#ffffffNo Malicious Grief"
    lore:
      - "&#bbbbbbDo not intentionally destroy spawn, public areas, or protected spaces"
      - "&#bbbbbbWorld PvP and raiding rules may change by season"
  advertising:
    material: OAK_SIGN
    slot: 15
    display_name: "&dRule 6 &8┃ &#ffffffNo Advertising"
    lore:
      - "&#bbbbbbDo not advertise other servers, scams, or unsafe links"
      - "&#bbbbbbMineacle links are available through &d/guide"
  staff:
    material: NETHER_STAR
    slot: 16
    display_name: "&dRule 7 &8┃ &#ffffffRespect Staff Decisions"
    lore:
      - "&#bbbbbbStaff may act to protect server stability and fairness"
      - "&#bbbbbbAppeals and disputes should be handled properly, not in public chat"
  common_sense:
    material: COMPASS
    slot: 22
    display_name: "&dRule 8 &8┃ &#ffffffUse Common Sense"
    lore:
      - "&#bbbbbbRules cannot cover every edge case"
      - "&#bbbbbbIf something clearly hurts the server, do not do it"
