title: "Rules"
size: 36

items:
  server-rules:
    slot: 11
    material: BOOK
    name: "&dServer Rules"
    lore:
      - "&#bbbbbbNo hacked clients"
      - "&#bbbbbbNo movement mods"
      - "&#bbbbbbNo inventory mods"
      - "&#bbbbbbNo radar, freecam, or x-ray"
      - "&#bbbbbbNo macros or scripts"
      - "&#bbbbbbNo abusing bugs or dupes"
      - "&#bbbbbbNo alternate-account abuse"
      - "&#bbbbbbNo real-money trading"
      - "&#bbbbbbNo invite-reward abuse"
      - "&#bbbbbbNo cross-server trading"
      - "&#bbbbbbNo seed finding"
      - "&#bbbbbbNo staff impersonation"
      - "&#bbbbbbNo external gambling"

  chat-rules:
    slot: 13
    material: PAPER
    name: "&dChat Rules"
    lore:
      - "&#bbbbbbNo spam or spam baiting"
      - "&#bbbbbbNo harassment"
      - "&#bbbbbbNo advertising or promotion"
      - "&#bbbbbbNo discrimination or hate speech"
      - "&#bbbbbbNo threats"
      - "&#bbbbbbNo sharing private information"
      - "&#bbbbbbNo impersonation"
      - "&#bbbbbbNo ban evasion"
      - "&#bbbbbbDo not deliberately mislead staff"

  economy-rules:
    slot: 15
    material: EMERALD
    name: "&dEconomy Rules"
    lore:
      - "&#bbbbbbNo price exploit abuse"
      - "&#bbbbbbNo duplicated-item trading"
      - "&#bbbbbbNo alternate-account farming abuse"
      - "&#bbbbbbNo market manipulation exploits"
      - "&#bbbbbbReport broken prices immediately"

  pvp-rules:
    slot: 21
    material: DIAMOND_SWORD
    name: "&dPvP & Duels"
    lore:
      - "&#bbbbbbPvP is enabled in the survival world"
      - "&#bbbbbbItems can be lost in combat"
      - "&#bbbbbbDo not abuse safe-zone boundaries"
      - "&#bbbbbbDo not abuse combat bugs"
      - "&#bbbbbbDuel outcomes are final"
