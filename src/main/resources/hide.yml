enabled: true

# Plus can use /hide. Admins/staff can use the admin permission below.
permission: mineacle.plus
admin-see-permission: mineaclehide.admin

# Hide is now intentionally simple:
# - the player stays visible
# - tab, scoreboard, display names, nicknames, and placeholders are not changed
# - only the vanilla nametag above the player is hidden
hide-real-nametag: true

# Gameplay-side masking options.
disable-pickup: true
disable-entity-target: true

messages:
  enabled: "&#bbbbbbHidden mode &#ff88ffenabled"
  disabled: "&#bbbbbbHidden mode &cdisabled"
  blocked: "&cMineacle+ is required to use /hide"
  actionbar: "&#bbbbbbYou are hidden"
