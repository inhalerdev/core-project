enabled: true
permission: mineacle.plus
admin-see-permission: mineaclehide.admin

# Hide mode masks identity only. It does not spawn fake floating nametag entities.
# The real vanilla nametag is hidden through the Nametag module while hidden.
visible-obfuscated: true
hide-from-tab: false

disable-pickup: true
disable-entity-target: true

hidden-name-colors:
  admin: "#ff88ff"
  plus: "#ffffff"

tab:
  obfuscate-name: true
  # Keeps LuckPerms prefix colors intact, then obfuscates only the display name.
  format: "%rank%%hidecolor%&k%displayname%"
  admin-format: "&#ff88ff[Hidden] &#bbbbbb%displayname%"

messages:
  enabled: "&#bbbbbbHidden mode &#ff88ffenabled"
  disabled: "&#bbbbbbHidden mode &cdisabled"
  blocked: "&cMineacle+ is required to use /hide"
  actionbar: "&#bbbbbbYou are hidden"
