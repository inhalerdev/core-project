enabled: true
permission: mineacle.plus
admin-see-permission: mineaclehide.admin

# Hide mode masks identity only. It does not make players immune or exempt from bounties, combat, or staff tools.
visible-obfuscated: true
hide-from-tab: false
disable-pickup: true
disable-entity-target: true

colors:
  admin: "#ff88ff"
  plus: "#ffffff"

obfuscated-nametag:
  enabled: true
  y-offset: 2.25
  format: "%hidecolor%+ &k%displayname%"
  admin-format: "&#ff88ff[Hidden] &#ffffff%displayname%"

tab:
  obfuscate-name: true
  format: "%hidecolor%+ &k%displayname%"
  admin-format: "&#ff88ff[Hidden] &#ffffff%displayname%"

messages:
  enabled: "&#bbbbbbHidden mode &#ff88ffenabled"
  disabled: "&#bbbbbbHidden mode &cdisabled"
  blocked: "&cMineacle+ is required to use /hide"
  actionbar: "&#bbbbbbYou are hidden"
