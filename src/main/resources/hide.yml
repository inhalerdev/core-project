enabled: true

# /hide is reserved for administrators.
permission: mineaclehide.admin

# /hide hides only the native overhead nametag.
# It never changes entity visibility, TAB, gameplay, inventory, pickups,
# building, combat, eating, or mob targeting.
nametag-only: true
hide-from-tab: false
persist-across-restarts: false

messages:
  enabled: "&#bbbbbbNametag hidden"
  disabled: "&#bbbbbbNametag visible"
  blocked: "&cYou do not have permission to use /hide"
  actionbar: "&#bbbbbbNametag hidden"
