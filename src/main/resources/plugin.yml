name: MineacleCore
main: net.mineacle.core.Core
version: 1.0.0
api-version: "1.21"
author: Mineacle
softdepend: [Vault, PlaceholderAPI, ProtocolLib, NuVotifier, Votifier]
loadbefore: [ajLeaderboards, DeluxeMenus, TAB]

commands:
  guide:
    description: Open the Mineacle guide
    aliases: [help, mineacle]
    usage: /guide
    permission: mineacleguide.use
  rules:
    description: Open the Mineacle rules
    usage: /rules
    permission: mineacleguide.use

  home:
    description: Open your homes menu
    aliases: [homes, h]
    permission: mineaclehomes.use
  sethome:
    description: Set a named home
    permission: mineaclehomes.use
  delhome:
    description: Delete a named home
    permission: mineaclehomes.use
  renamehome:
    description: Rename a saved home
    permission: mineaclehomes.use
  mineaclehomes:
    description: Reload homes config
    permission: mineaclehomes.admin

  team:
    description: Create, join, and manage your team
    aliases: [teams]
    permission: mineacleteams.use

  tpa:
    description: Request to teleport to a player
    aliases: [tpask]
    usage: /tpa <player>
    permission: mineacletpa.use
  tpahere:
    description: Request a player teleport to you
    aliases: [tphere, tpah]
    usage: /tpahere <player>
    permission: mineacletpa.use
  tpaccept:
    description: Accept a teleport request
    aliases: [tpyes, accepttp]
    usage: /tpaccept
    permission: mineacletpa.use
  tpadeny:
    description: Deny a teleport request
    aliases: [tpdeny, tpno, denytp]
    usage: /tpadeny
    permission: mineacletpa.use
  tpacancel:
    description: Cancel your outgoing teleport request
    usage: /tpacancel
    permission: mineacletpa.use
  tpauto:
    description: Toggle automatic TPA acceptance
    usage: /tpauto
    permission: mineacletpa.use

  stats:
    description: View player stats
    permission: mineaclestats.use

  bal:
    description: View your balance
    aliases: [balance, money]
    permission: mineacleeconomy.use
  pay:
    description: Pay another player
    permission: mineacleeconomy.pay
  eco:
    description: Manage balances
    permission: mineacleeconomy.admin
  baltop:
    description: View balance top
    aliases: [balancetop]
    permission: mineaclebaltop.use

  msg:
    description: Send a private message
    aliases: [tell, w, whisper, m]
    permission: mineaclechat.message
  r:
    description: Reply to your last private message
    aliases: [reply]
    permission: mineaclechat.message
  ignore:
    description: Ignore a player
    permission: mineaclechat.ignore
  ignorelist:
    description: View ignored players
    permission: mineaclechat.ignore
  nick:
    description: Set your nickname
    permission: mineaclechat.nick
  realname:
    description: Check a player's real name from nickname
    permission: mineaclechat.realname

  spawn:
    description: Open the spawn menu
    usage: /spawn
    aliases: [lobby]
    permission: mineaclespawn.use
  originrtp:
    description: Queue for random teleport
    usage: /originrtp
    aliases: [rtp, originsrtp, wild]
    permission: mineaclertp.use

  doublejump:
    description: Reload double jump config
    usage: /doublejump reload
    permission: mineacledoublejump.admin
  fly:
    description: Toggle flight in spawn worlds
    usage: /fly
    permission: mineaclefly.command

  warp:
    description: Warp to a spawn location
    usage: /warp <location>
    aliases: [warps]
    permission: mineaclewarps.use
  setwarp:
    description: Set a warp
    usage: /setwarp <name> [slot] [display name]
    permission: mineaclewarps.admin
  delwarp:
    description: Delete a warp
    usage: /delwarp <name>
    permission: mineaclewarps.admin

  order:
    description: Open player orders
    aliases: [orders]
    usage: /order
    permission: mineacleorders.use
  sell:
    description: Open sell menu
    usage: /sell
    permission: mineaclesell.use
  worth:
    description: Open item prices menu
    aliases: [prices, itemprices]
    usage: /worth
    permission: mineaclesell.use
  sellmulti:
    description: View sell multiplier progress
    usage: /sellmulti
    permission: mineaclesell.use

  bounty:
    description: View or place bounties
    usage: /bounty
    permission: mineaclebounty.use

  gmc:
    description: Set gamemode creative
    usage: /gmc
    permission: mineacle.gamemode
  gms:
    description: Set gamemode survival
    usage: /gms
    permission: mineacle.gamemode
  gmsp:
    description: Set gamemode spectator
    usage: /gmsp
    permission: mineacle.gamemode
  gma:
    description: Set gamemode adventure
    usage: /gma
    permission: mineacle.gamemode

  links:
    description: View Mineacle links
    aliases: [link, socials, social]
    usage: /links
    permission: mineaclelinks.use
  discord:
    description: View the Mineacle Discord link
    aliases: [dc]
    usage: /discord
    permission: mineaclelinks.use
  store:
    description: View the Mineacle store link
    aliases: [buy, shop]
    usage: /store
    permission: mineaclelinks.use
  x:
    description: View the Mineacle X link
    aliases: [twitter]
    usage: /x
    permission: mineaclelinks.use

  hide:
    description: Toggle hidden mode
    usage: /hide
    permission: mineaclehide.use
  mineaclenametags:
    description: Reload Mineacle nametags
    aliases: [nametags]
    usage: /mineaclenametags reload
    permission: mineaclenametags.admin
  mineaclesecurity:
    description: Reload Mineacle security
    usage: /mineaclesecurity reload
    permission: mineaclesecurity.bypass

  enchant:
    description: Enchant the item in your hand
    usage: /enchant <enchant> [level]
    permission: mineacleenchant.admin
  enchantinfo:
    description: View enchantment information
    usage: /enchantinfo <enchant>
    permission: mineacleenchant.admin

permissions:
  mineacleguide.use:
    default: true
  mineacleguide.admin:
    default: op
  mineacle.plus:
    default: false
  mineacle.gamemode:
    default: op

  mineaclehomes.use:
    default: true
  mineaclehomes.admin:
    default: op

  mineacleteams.use:
    default: true
  mineacleteams.admin:
    default: op

  mineacletpa.use:
    default: true
  mineacletpa.admin:
    default: op

  mineaclestats.use:
    default: true
  mineaclestats.admin:
    default: op

  mineacleeconomy.use:
    default: true
  mineacleeconomy.pay:
    default: true
  mineacleeconomy.admin:
    default: op

  mineaclebaltop.use:
    default: true
  mineaclebaltop.admin:
    default: op

  mineaclechat.message:
    default: true
  mineaclechat.ignore:
    default: true
  mineaclechat.nick:
    default: false
  mineaclechat.realname:
    default: true
  mineaclechat.admin:
    default: op

  mineaclespawn.use:
    default: true
  mineaclespawn.admin:
    default: op

  mineaclertp.use:
    default: true
  mineaclertp.admin:
    default: op

  mineacledoublejump.admin:
    default: op
  mineaclefly.command:
    default: true
  mineaclefly.use:
    default: false
  mineaclefly.admin:
    default: op

  mineaclewarps.use:
    default: true
  mineaclewarps.admin:
    default: op

  mineacleorders.use:
    default: true
  mineacleorders.admin:
    default: op

  mineaclesell.use:
    default: true
  mineaclesell.admin:
    default: op

  mineaclebounty.use:
    default: true
  mineaclebounty.admin:
    default: op

  mineaclelinks.use:
    default: true
  mineaclelinks.admin:
    default: op

  mineaclehide.use:
    default: false
  mineaclehide.admin:
    default: op

  mineaclenametags.admin:
    default: op

  mineaclesecurity.bypass:
    default: op
  mineaclesecurity.group.admin:
    default: op

  mineacleenchant.admin:
    default: op
