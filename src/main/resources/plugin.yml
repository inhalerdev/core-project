name: MineacleCore
main: net.mineacle.core.Core
version: 1.0.0
api-version: "1.21"
author: Mineacle
softdepend: [Vault, PlaceholderAPI, ProtocolLib, NuVotifier, Votifier]
loadbefore: [ajLeaderboards, DeluxeMenus, TAB]

commands:
  auction:
    description: Open the auction house
    aliases: [ah, auctionhouse]
    usage: /auction
    permission: mineacleauctionhouse.use

  guide:
    description: Open the Mineacle guide
    aliases: [help, mineacle]
    usage: /guide
    permission: mineacleguide.use

  rules:
    description: Open the Mineacle rules
    usage: /rules
    permission: mineacleguide.use

  home:
    description: Open your homes menu
    aliases: [homes, h]
    usage: /home
    permission: mineaclehomes.use

  sethome:
    description: Set a named home
    usage: /sethome <name>
    permission: mineaclehomes.use

  delhome:
    description: Delete a named home
    usage: /delhome <name>
    permission: mineaclehomes.use

  renamehome:
    description: Rename a saved home
    usage: /renamehome <name> <new>
    permission: mineaclehomes.use

  mineaclehomes:
    description: Reload homes config
    usage: /mineaclehomes reload
    permission: mineaclehomes.admin

  team:
    description: Create, join, and manage your team
    aliases: [teams]
    usage: /team
    permission: mineacleteams.use

  tpa:
    description: Request to teleport to a player
    usage: /tpa <player>
    permission: mineacletpa.use

  tpahere:
    description: Request a player teleport to you
    aliases: [tphere]
    usage: /tpahere <player>
    permission: mineacletpa.use

  tpaccept:
    description: Accept a teleport request
    aliases: [tpyes]
    usage: /tpaccept
    permission: mineacletpa.use

  tpdeny:
    description: Deny a teleport request
    aliases: [tpadeny, tpno]
    usage: /tpdeny
    permission: mineacletpa.use

  tpacancel:
    description: Cancel your outgoing teleport request
    usage: /tpacancel
    permission: mineacletpa.use

  tpauto:
    description: Toggle auto accepting teleport requests
    usage: /tpauto
    permission: mineacletpa.use

  stats:
    description: View player stats
    usage: /stats [player]
    permission: mineaclestats.use

  balance:
    description: View your balance
    aliases: [bal, money]
    usage: /balance [player]
    permission: mineacleeconomy.use

  pay:
    description: Pay another player
    usage: /pay <player> <amount>
    permission: mineacleeconomy.pay

  eco:
    description: Manage balances
    usage: /eco
    permission: mineacleeconomy.admin

  baltop:
    description: View balance top
    aliases: [balancetop]
    usage: /baltop
    permission: mineaclebaltop.use

  msg:
    description: Send a private message
    aliases: [tell, w, m]
    usage: /msg <player> <message>
    permission: mineaclechat.message

  r:
    description: Reply to your last private message
    aliases: [reply]
    usage: /r <message>
    permission: mineaclechat.message

  ignore:
    description: Ignore a player
    usage: /ignore <player>
    permission: mineaclechat.ignore

  ignorelist:
    description: View ignored players
    usage: /ignorelist
    permission: mineaclechat.ignore

  nick:
    description: Set your nickname
    usage: /nick <name>
    permission: mineaclechat.nick

  realname:
    description: Check a player's real name from nickname
    usage: /realname <nickname>
    permission: mineaclechat.realname

  spawn:
    description: Open the spawn menu
    aliases: [lobby]
    usage: /spawn
    permission: mineaclespawn.use

  warp:
    description: Teleport to a warp
    aliases: [warps]
    usage: /warp <name>
    permission: mineaclewarps.use

  setwarp:
    description: Set a warp
    usage: /setwarp <name> [slot] [display name]
    permission: mineaclewarps.admin

  delwarp:
    description: Delete a warp
    usage: /delwarp <name>
    permission: mineaclewarps.admin

  originrtp:
    description: Queue for random teleport
    aliases: [rtp, wild]
    usage: /rtp
    permission: mineaclertp.use

  doublejump:
    description: Reload double jump config
    usage: /doublejump reload
    permission: mineacledoublejump.admin

  fly:
    description: Toggle flight in spawn worlds
    usage: /fly
    permission: mineaclefly.command

  speed:
    description: Set walking or flying speed
    aliases: [walkspeed, flyspeed]
    usage: /speed <speed> [player]
    permission: mineaclespeed.use

  order:
    description: Open player orders
    aliases: [orders]
    usage: /order
    permission: mineacleorders.use

  sell:
    description: Open sell menu
    usage: /sell
    permission: mineaclesell.use

  sellmulti:
    description: Open the multi sell menu
    usage: /sellmulti
    permission: mineaclesell.use

  worth:
    description: Open item prices menu
    usage: /worth [item]
    permission: mineaclesell.use

  bounty:
    description: View or place bounties
    usage: /bounty
    permission: mineaclebounty.use

  gmc:
    description: Set gamemode creative
    usage: /gmc
    permission: mineacle.gamemode

  gms:
    description: Set gamemode survival
    usage: /gms
    permission: mineacle.gamemode

  gmsp:
    description: Set gamemode spectator
    usage: /gmsp
    permission: mineacle.gamemode

  gma:
    description: Set gamemode adventure
    usage: /gma
    permission: mineacle.gamemode

  discord:
    description: View the Mineacle Discord link
    usage: /discord
    permission: mineaclelinks.use

  store:
    description: View the Mineacle store link
    usage: /store
    permission: mineaclelinks.use

  x:
    description: View the Mineacle X link
    usage: /x
    permission: mineaclelinks.use

  hide:
    description: Toggle hidden mode
    usage: /hide
    permission: mineaclehide.use

  mineaclenametags:
    description: Reload Mineacle nametags
    aliases: [nametags]
    usage: /mineaclenametags reload
    permission: mineaclenametags.admin

  mineaclesecurity:
    description: Reload Mineacle security
    usage: /mineaclesecurity reload
    permission: mineaclesecurity.bypass

  enchant:
    description: Enchant your held item
    usage: /enchant <enchantment> [level]
    permission: mineacleenchant.admin

  enchantinfo:
    description: View enchantment information
    usage: /enchantinfo <enchantment>
    permission: mineacleenchant.admin

  duel:
    description: Challenge players or join Mineacle duels
    aliases: [duels]
    usage: /duel <player>
    permission: mineacleduels.use

  mineacleworldmaintenance:
    description: Control world maintenance groups
    aliases: [worldmaintenance, wm]
    usage: /mineacleworldmaintenance <group> <on|off>
    permission: mineacleworldmaintenance.admin

  invsee:
    description: Inspect an online player's inventory
    usage: /invsee <player>
    permission: mineacleadmin.invsee

  echest:
    description: Inspect an online player's ender chest
    aliases: [enderchest, ecsee]
    usage: /echest <player>
    permission: mineacleadmin.echest

permissions:
  mineacleguide.use:
    default: true
  mineacleguide.admin:
    default: op

  mineacle.plus:
    default: false
  mineacle.gamemode:
    default: op

  mineaclehomes.use:
    default: true
  mineaclehomes.admin:
    default: op

  mineacleteams.use:
    default: true
  mineacleteams.admin:
    default: op

  mineacletpa.use:
    default: true
  mineacletpa.admin:
    default: op

  mineaclestats.use:
    default: true
  mineaclestats.admin:
    default: op

  mineacleeconomy.use:
    default: true
  mineacleeconomy.pay:
    default: true
  mineacleeconomy.admin:
    default: op

  mineaclebaltop.use:
    default: true
  mineaclebaltop.admin:
    default: op

  mineaclechat.message:
    default: true
  mineaclechat.ignore:
    default: true
  mineaclechat.nick:
    default: false
  mineaclechat.realname:
    default: true
  mineaclechat.admin:
    default: op

  mineaclespawn.use:
    default: true
  mineaclespawn.admin:
    default: op

  mineaclewarps.use:
    default: true
  mineaclewarps.admin:
    default: op

  mineaclertp.use:
    default: true
  mineaclertp.admin:
    default: op

  mineacledoublejump.admin:
    default: op

  mineaclefly.command:
    default: true
  mineaclefly.use:
    default: false
  mineaclefly.admin:
    default: op

  mineaclespeed.use:
    default: op
  mineaclespeed.others:
    default: op
  mineaclespeed.admin:
    default: op
  mineaclespeed.developer:
    default: op

  mineacleorders.use:
    default: true
  mineacleorders.admin:
    default: op

  mineaclesell.use:
    default: true
  mineaclesell.admin:
    default: op

  mineaclebounty.use:
    default: true
  mineaclebounty.admin:
    default: op

  mineaclelinks.use:
    default: true
  mineaclelinks.admin:
    default: op

  mineaclehide.use:
    default: false
  mineaclehide.admin:
    default: op

  mineaclenametags.admin:
    default: op

  mineaclesecurity.bypass:
    default: op
  mineaclesecurity.group.admin:
    default: op

  mineacleenchant.admin:
    default: op

  mineacleworldmaintenance.admin:
    default: op
  mineacleworldmaintenance.bypass:
    default: op

  mineacleduels.use:
    default: true
  mineacleduels.admin:
    default: op

  mineacleadmin.invsee:
    default: op
  mineacleadmin.invsee.self:
    default: op
  mineacleadmin.echest:
    default: op
  mineacleadmin.echest.self:
    default: op
  mineacleshulkerpreview.use:
    default: false
  mineacleshulkerpreview.admin:
    default: op

  mineacleauctionhouse.use:
    default: true
  mineacleauctionhouse.sell:
    default: false
  mineacleauctionhouse.admin:
    default: op
