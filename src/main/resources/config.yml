fly:
  enabled: true
  permission: mineacle.plus
  worlds:
    - spawn1
    - spawn2
    - spawn3
  messages:
    enabled: "&#bbbbbbFlight &aEnabled&#bbbbbb in &#ff88ff%world%"
    disabled: "&#bbbbbbFlight &cDisabled&#bbbbbb in &#ff88ff%world%"
    blocked-world: "&cFlight is only available in spawn"
    upgrade-line-1: "&fThis feature requires &dMineacle+"
    upgrade-line-2: "&dhttps://store.mineacle.net"

spawn-restrictions:
  enabled: true
  worlds:
    - spawn1
    - spawn2
    - spawn3
  prevent-wither-rose-effects: true

  # Deep Dark blocks may be placed in spawn worlds, but they should not activate, listen, pulse, or make noise.
  # Use this list for right-click/activation blocking only.
  blocked-interactions:
    - SCULK_SHRIEKER
    - SCULK_SENSOR
    - CALIBRATED_SCULK_SENSOR
    - SCULK_CATALYST

  # Placement is allowed. Do not list Deep Dark blocks here.
  blocked-placement: []

  # Breaking is allowed. Protection/claims should handle spawn build rules elsewhere if needed.
  blocked-breaking: []

  # These blocks should also have vibration/game-event activation cancelled in spawn worlds.
  blocked-game-events:
    - SCULK_SHRIEKER
    - SCULK_SENSOR
    - CALIBRATED_SCULK_SENSOR
    - SCULK_CATALYST

