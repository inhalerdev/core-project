teleport-perks:
  plus-permission: mineacle.plus
  default-delay-seconds: 5
  plus-delay-seconds: 3
homes:
  max-homes:
    default: 3
    plus: 5
  plus-permission: mineacle.plus
  default-name-format: Home %id%
  allowed-worlds:
    enabled: true
    worlds:
    - overworld
    - overworld_nether
    - overworld_the_end
  blocked-worlds:
  - spawn1
  - spawn2
  - spawn3
  teleport:
    delay-seconds: 5
    plus-delay-seconds: 3
    cancel-on-move: true
    cancel-distance: 2.0
  delete-confirm:
    timeout-seconds: 5
  team-home:
    enabled: true
    banner-slot: 10
    dye-slot: 19
    teleport-delay-seconds: 5
    plus-teleport-delay-seconds: 3
    cancel-on-move: true
    cancel-distance: 2.0
    delete-confirm-timeout-seconds: 5
    allowed-worlds:
      enabled: true
      worlds:
      - overworld
      - overworld_nether
      - overworld_the_end
    blocked-worlds:
    - spawn1
    - spawn2
    - spawn3
teams:
  enabled: true
  max-members: 45
  ban-days: 7
  invites:
    timeout-seconds: 120
tpa:
  enabled: true
  request-timeout-seconds: 60
  teleport-delay-seconds: 5
  plus-teleport-delay-seconds: 3
  cancel-on-move: true
  cancel-distance: 2.0
punish:
  appeal-url: https://mineacle.net/appeal
  case-prefix: MCL
  commands:
    tempban: 'tempban %player% %duration% %reason% Appeal ID: %case_id%'
    permaban: 'ban %player% %reason% Appeal ID: %case_id%'
  reasons:
    cheating:
      name: '&cCheating'
      material: DIAMOND_SWORD
      reason: Cheating
    xray:
      name: '&cX-Ray'
      material: DIAMOND_ORE
      reason: X-Ray
    duping:
      name: '&cDuping'
      material: CHEST
      reason: Duping
economy:
  enabled: true
  starting-balance: '0'
  save-retry-seconds: 30
  currency-symbol: $
  pay:
    enabled: true
    minimum: '0.01'
baltop:
  enabled: true
  gui-title: Balance Top
  entries-per-page: 45
nickname:
  enabled: true
  show-command-when-disabled: false
  allow-default: false
  plus-permission: mineacle.plus
  permission: mineaclechat.nick
  prefix: .
  max-length: 15
  allowed-regex: ^[a-zA-Z0-9_]+$
  prevent-username-impersonation: true
  default-name-color: '#bbbbbb'
  op-name-color: '#bbbbbb'
chat:
  enabled: true
  format: '%luckperms_prefix% &#bbbbbb%mineacle_chat_displayname%&#bbbbbb: &#bbbbbb%message%'
  worlds:
    mode: grouped
    groups:
      global:
      - spawn1
      - spawn2
      - spawn3
      - overworld
      - overworld_nether
      - overworld_the_end
placeholders:
  empty-slot: '---'
  labels:
    unranked: Unranked
    enabled: Enabled
    disabled: Disabled
    'true': 'true'
    'false': 'false'
  cache:
    refresh-ticks: 600
    maximum-leaderboard-positions: 100
  datetime:
    timezone: America/Chicago
    date-format: MM/dd/yy
    time-format: hh:mm
    datetime-format: MM/dd/yy | hh:mm
origin-rtp:
  enabled: true
  plus:
    permission: mineacle.plus
    priority: true
    delay-seconds: 3
  default:
    delay-seconds: 5
  cooldown:
    default-seconds: 0
    plus-seconds: 0
  queue:
    process-every-ticks: 10
    max-countdowns-at-once: 3
    max-searches-at-once: 2
    plus-priority-burst: 3
  teleport:
    cancel-on-move: true
    cancel-distance: 2.0
  search:
    use-world-border: true
    center-x: 0
    center-z: 0
    min-radius: 250
    max-radius: 5000
    shape: circle
    max-attempts: 128
    nearby-safety-radius: 1
  unsafe-blocks:
  - WATER
  - LAVA
  - FIRE
  - SOUL_FIRE
  - CACTUS
  - MAGMA_BLOCK
  - POWDER_SNOW
  - BEDROCK
  - SWEET_BERRY_BUSH
  - WITHER_ROSE
  destinations:
    overworld:
      enabled: true
      display-name: Overworld
      world: overworld
      search:
        min-y: 60
        max-y: 319
        surface-only: true
    nether:
      enabled: true
      display-name: Nether
      world: overworld_nether
      search:
        min-y: 32
        max-y: 118
        surface-only: false
    end:
      enabled: true
      display-name: The End
      world: overworld_the_end
      search:
        min-y: 48
        max-y: 255
        surface-only: true
  messages:
    disabled: '&cRandom teleport is unavailable for %world%'
    already-active: '&cYou already have an active random teleport'
    queued: '&#bbbbbbQueued for &#ff88ff%world% RTP &#bbbbbb— position &#ff88ff%position%'
    cooldown: '&cYou can use random teleport again in %seconds%s'
    countdown: '&#bbbbbbTeleporting to &#ff88ff%world% &#bbbbbbin &#ff88ff%seconds%s'
    searching: '&#bbbbbbSearching for a safe &#ff88ff%world% &#bbbbbblocation'
    failed: '&cCould not find a safe random teleport location'
    teleported: '&#bbbbbbTeleported to a random &#ff88ff%world% &#bbbbbblocation'
    cancelled-move: '&cTeleport cancelled — you moved'
