teleport-perks:
  plus-permission: mineacle.plus
  default-delay-seconds: 5
  plus-delay-seconds: 3

homes:
  max-homes:
    default: 2
    plus: 5
  plus-permission: mineacle.plus
  default-name-format: "Home %id%"
  allowed-worlds:
    enabled: true
    worlds:
      - origins
      - origins_nether
      - origins_the_end
  blocked-worlds:
    - spawn1
    - spawn2
    - spawn3
  teleport:
    delay-seconds: 5
    plus-delay-seconds: 3
    cancel-on-move: true
    cancel-distance: 1.0
  delete-confirm:
    timeout-seconds: 5
  team-home:
    enabled: true
    banner-slot: 10
    dye-slot: 19
    teleport-delay-seconds: 5
    plus-teleport-delay-seconds: 3
    cancel-on-move: true
    cancel-distance: 1.0
    delete-confirm-timeout-seconds: 5
    allowed-worlds:
      enabled: true
      worlds:
        - origins
    blocked-worlds:
      - spawn1
      - origins_nether
      - origins_the_end
      - spawn2
      - spawn3

teams:
  enabled: true
  max-members: 45
  ban-days: 7
  invites:
    timeout-seconds: 120

tpa:
  enabled: true
  request-timeout-seconds: 60
  teleport-delay-seconds: 5
  plus-teleport-delay-seconds: 3
  cancel-on-move: true
  cancel-distance: 2.0

punish:
  appeal-url: "https://mineacle.net/appeal"
  case-prefix: "MCL"

  commands:
    tempban: "tempban %player% %duration% %reason% Appeal ID: %case_id%"
    permaban: "ban %player% %reason% Appeal ID: %case_id%"

  reasons:
    cheating:
      name: "&cCheating"
      material: DIAMOND_SWORD
      reason: "Cheating"
    xray:
      name: "&cX-Ray"
      material: DIAMOND_ORE
      reason: "X-Ray"
    duping:
      name: "&cDuping"
      material: CHEST
      reason: "Duping"

economy:
  enabled: true
  starting-balance: 0
  currency-symbol: "$"
  pay:
    enabled: true
    minimum: 0.01

baltop:
  enabled: true
  gui-title: Balance Top
  entries-per-page: 45

nickname:
  enabled: true
  prefix: "."
  max-length: 15
  allowed-regex: "^[a-zA-Z_0-9&§]+$"
  default-name-color: "#bbbbbb"
  op-name-color: "#ff55ff"

chat:
  enabled: true
  format: "%luckperms_prefix%%mineacle_chat_displayname%&#bbbbbb: &#bbbbbb%message%"
  worlds:
    mode: grouped
    groups:
      global:
        - spawn1
        - origins_nether
        - origins_the_end
        - spawn2
        - spawn3
        - origins

placeholders:
  datetime:
    timezone: America/Chicago
    date-format: MM/dd/yy
    time-format: hh:mm
    datetime-format: "MM/dd/yy | hh:mm"

origin-rtp:
  enabled: true
  world: origins

  destinations:
    origins:
      enabled: true
      display-name: Origins
      world: origins
      search:
        min-y: 64
        max-y: 320
        min-radius: 5000
        max-radius: 48000

    nether:
      enabled: true
      display-name: Nether
      world: origins_nether
      search:
        min-y: 32
        max-y: 118
        min-radius: 5000
        max-radius: 48000

    end:
      enabled: true
      display-name: End
      world: origins_the_end
      search:
        min-y: 48
        max-y: 256
        min-radius: 5000
        max-radius: 48000

  queue:
    enabled: true
    process-every-ticks: 10
    max-processing-at-once: 2
    default:
      delay-seconds: 5
    plus:
      permission: mineacle.plus
      delay-seconds: 3
      priority: true

  teleport:
    cancel-on-move: true
    cancel-distance: 1.0

  search:
    use-world-border: false
    center-x: 0
    center-z: 1
    min-radius: 5000
    max-radius: 48000
    shape: square
    min-y: 64
    max-y: 320
    max-attempts: 768
    preload-radius: 1
    respect-worldguard: false
    unsafe-blocks:
      - AIR
      - CAVE_AIR
      - VOID_AIR
      - WATER
      - LAVA
      - FIRE
      - SOUL_FIRE
      - CACTUS
      - MAGMA_BLOCK
      - POWDER_SNOW
      - BEDROCK
      - KELP
      - KELP_PLANT
      - OAK_LEAVES
      - SPRUCE_LEAVES
      - BIRCH_LEAVES
      - JUNGLE_LEAVES
      - ACACIA_LEAVES
      - DARK_OAK_LEAVES
      - MANGROVE_LEAVES
      - CHERRY_LEAVES
      - AZALEA_LEAVES
      - FLOWERING_AZALEA_LEAVES

  messages:
    disabled: "&cRTP is disabled"
    already-queued: "&#ff88ffQueue&#bbbbbb: You are already in the random teleport queue"
    queued: "&#ff88ffQueue&#bbbbbb: Finding a safe spot in &d%world%"
    queued-position: "&#ff88ffQueue&#bbbbbb: Position &d#%position% &#bbbbbbfor &d%world%"
    countdown: "&#bbbbbbTeleporting to &d%world% &#bbbbbbin &d%seconds%s"
    cancelled: "&cTeleport cancelled — you moved"
    searching: "&#ff88ffQueue&#bbbbbb: Finding a safe spot in &d%world%"
    failed: "&#bbbbbbCould not find a &csafe &#bbbbbbspot in &d%world%"
    teleported: "&#bbbbbbTeleported to &d%world%"

