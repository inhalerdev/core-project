enabled: true
shutdown-message-active-seconds: 30

messages:
  whitelist:
    - "&d&lMineacle"
    - ""
    - "&#bbbbbbThe server is currently whitelisted"
    - "&#bbbbbbJoin our Discord for updates"
    - ""
    - "&ddiscord.gg/4xrYFxdSWg"

  maintenance:
    - "&d&lMineacle"
    - ""
    - "&#bbbbbbThe server is currently under maintenance"
    - "&#bbbbbbPlease check back soon"

  full:
    - "&d&lMineacle"
    - ""
    - "&#bbbbbbThe server is currently full"
    - "&#bbbbbbPlease try again soon"

  shutdown:
    - "&d&lMineacle"
    - ""
    - "&#bbbbbbThe server is shutting down"
    - "&#bbbbbbPlease reconnect in a moment"

  restart:
    - "&d&lMineacle"
    - ""
    - "&#bbbbbbThe server is restarting"
    - "&#bbbbbbPlease reconnect in a moment"

chat:
  reloaded: "&dMineacle &8» &#bbbbbbServer messages reloaded"
  maintenance-enabled: "&dMineacle &8» &#bbbbbbMaintenance mode enabled"
  maintenance-disabled: "&dMineacle &8» &#bbbbbbMaintenance mode disabled"
  restart-started: "&dMineacle &8» &#bbbbbbRestarting server"
  shutdown-started: "&dMineacle &8» &#bbbbbbShutting down server"

maintenance:
  enabled: false
  bypass-permission: mineacleservermessages.bypass

world-maintenance:
  bypass-permission: mineacleservermessages.bypass
  notify-interval-seconds: 10

  redirect-spawn:
    world: spawn1
    use-exact-location: false
    x: 0.5
    y: 67.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0

  groups:
    survival:
      enabled: false
      action: redirect-spawn
      worlds:
        - origins
        - origins_nether
        - origins_the_end
      message: "&#bbbbbbSurvival worlds are being worked on for &dQoL &#bbbbbbor &dSafety &#bbbbbbupdates"
      actionbar: "&#bbbbbbSurvival is under maintenance"

    spawn:
      enabled: false
      action: notify
      worlds:
        - spawn1
        - spawn2
        - spawn3
      message: "&#bbbbbbSpawn is being worked on for &dQoL &#bbbbbbor &dSafety &#bbbbbbupdates"
      actionbar: "&#bbbbbbQoL or safety updates are being applied"
